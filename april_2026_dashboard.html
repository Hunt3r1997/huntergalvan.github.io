<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amped Up Lawn Care - April 2026 Summary</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e1a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
            padding: 20px;
            min-height: 100vh;
            color: #e5e7eb;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1em;
            color: #9ca3af;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(55, 65, 81, 0.5);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 12px 48px rgba(16, 185, 129, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-label {
            font-size: 0.75em;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card-value {
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'JetBrains Mono', monospace;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(55, 65, 81, 0.5);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .chart-container:hover {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .chart-title {
            font-size: 1.2em;
            color: #f9fafb;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #10b981, #3b82f6);
            border-radius: 2px;
        }

        .table-container {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(55, 65, 81, 0.5);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(16, 185, 129, 0.3);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(55, 65, 81, 0.3);
            color: #d1d5db;
        }

        tr:hover {
            background: rgba(16, 185, 129, 0.05);
        }

        .progress-bar {
            background: rgba(55, 65, 81, 0.5);
            border-radius: 8px;
            height: 8px;
            overflow: hidden;
            position: relative;
            margin-top: 6px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            height: 100%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        small {
            color: #9ca3af;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .card-value {
                font-size: 2.2em;
            }

            .summary-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ AMPED UP LAWN CARE</h1>
            <div class="subtitle">APRIL 2026 // MONTHLY ANALYTICS</div>
        </header>

        <div class="summary-cards">
            <div class="card">
                <div class="card-label">Total Monthly Revenue</div>
                <div class="card-value">$825</div>
            </div>
            <div class="card">
                <div class="card-label">Active Customers</div>
                <div class="card-value">5</div>
            </div>
            <div class="card">
                <div class="card-label">Total CO₂ Saved</div>
                <div class="card-value">63.33 lbs</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">Revenue per Customer</div>
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Service Frequency Split</div>
                <canvas id="frequencyChart"></canvas>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container" style="grid-column: 1 / -1;">
                <div class="chart-title">CO₂ Saved per Customer</div>
                <canvas id="co2Chart"></canvas>
            </div>
        </div>

        <div class="table-container">
            <div class="chart-title">Customer Breakdown</div>
            <table>
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Service Type</th>
                        <th>Total Revenue</th>
                        <th>CO₂ Saved (lbs)</th>
                        <th>Revenue Share</th>
                    </tr>
                </thead>
                <tbody id="customerTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Customer data aggregated from CSV
        const customerData = [
            { name: 'Cristina', service: 'Weekly', revenue: 325, co2: 25.00, services: 5 },
            { name: 'Travis', service: 'Weekly', revenue: 210, co2: 15.00, services: 4 },
            { name: 'Denise', service: 'Biweekly', revenue: 120, co2: 15.00, services: 3 },
            { name: 'Leo', service: 'Biweekly', revenue: 100, co2: 3.34, services: 2 },
            { name: 'Kiara', service: 'Biweekly', revenue: 70, co2: 5.00, services: 1 }
        ];

        const totalRevenue = 825;

        // Sort by revenue descending
        customerData.sort((a, b) => b.revenue - a.revenue);

        // Revenue per Customer Bar Chart
        const revenueCtx = document.getElementById('revenueChart').getContext('2d');
        new Chart(revenueCtx, {
            type: 'bar',
            data: {
                labels: customerData.map(c => c.name),
                datasets: [{
                    label: 'Revenue ($)',
                    data: customerData.map(c => c.revenue),
                    backgroundColor: 'rgba(16, 185, 129, 0.8)',
                    borderColor: '#10b981',
                    borderWidth: 2,
                    borderRadius: 8,
                    hoverBackgroundColor: '#10b981',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.95)',
                        titleColor: '#10b981',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(16, 185, 129, 0.3)',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(55, 65, 81, 0.3)',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#9ca3af',
                            callback: function(value) {
                                return '$' + value;
                            }
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#9ca3af'
                        }
                    }
                }
            }
        });

        // Service Frequency Doughnut Chart
        const weeklyCount = customerData.filter(c => c.service === 'Weekly').length;
        const biweeklyCount = customerData.filter(c => c.service === 'Biweekly').length;
        
        // Calculate total revenue for weekly and biweekly
        const weeklyRevenue = customerData.filter(c => c.service === 'Weekly').reduce((sum, c) => sum + c.revenue, 0);
        const biweeklyRevenue = customerData.filter(c => c.service === 'Biweekly').reduce((sum, c) => sum + c.revenue, 0);

        const frequencyCtx = document.getElementById('frequencyChart').getContext('2d');
        new Chart(frequencyCtx, {
            type: 'doughnut',
            data: {
                labels: ['Weekly', 'Biweekly'],
                datasets: [{
                    data: [weeklyCount, biweeklyCount],
                    backgroundColor: [
                        'rgba(59, 130, 246, 0.8)',
                        'rgba(16, 185, 129, 0.8)'
                    ],
                    borderWidth: 3,
                    borderColor: '#111827',
                    hoverBackgroundColor: [
                        '#3b82f6',
                        '#10b981'
                    ],
                    hoverBorderColor: '#1f2937',
                    revenue: [weeklyRevenue, biweeklyRevenue]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 20,
                            font: {
                                size: 13,
                                family: 'Inter'
                            },
                            color: '#e5e7eb',
                            usePointStyle: true,
                            pointStyle: 'circle'
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.95)',
                        titleColor: '#10b981',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(16, 185, 129, 0.3)',
                        borderWidth: 1,
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                const label = context.label || '';
                                const count = context.parsed;
                                const revenue = context.dataset.revenue[context.dataIndex];
                                return [
                                    `${label}: ${count} customers`,
                                    `Total Revenue: $${revenue.toFixed(2)}`
                                ];
                            }
                        }
                    }
                }
            }
        });

        // CO₂ Saved per Customer Bar Chart
        const co2Ctx = document.getElementById('co2Chart').getContext('2d');
        new Chart(co2Ctx, {
            type: 'bar',
            data: {
                labels: customerData.map(c => c.name),
                datasets: [{
                    label: 'CO₂ Saved (lbs)',
                    data: customerData.map(c => c.co2),
                    backgroundColor: customerData.map(c => 
                        c.service === 'Weekly' ? 'rgba(59, 130, 246, 0.8)' : 'rgba(16, 185, 129, 0.8)'
                    ),
                    borderColor: customerData.map(c => 
                        c.service === 'Weekly' ? '#3b82f6' : '#10b981'
                    ),
                    borderWidth: 2,
                    borderRadius: 8,
                    hoverBackgroundColor: customerData.map(c => 
                        c.service === 'Weekly' ? '#3b82f6' : '#10b981'
                    )
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.95)',
                        titleColor: '#10b981',
                        bodyColor: '#e5e7eb',
                        borderColor: 'rgba(16, 185, 129, 0.3)',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(55, 65, 81, 0.3)',
                            drawBorder: false
                        },
                        ticks: {
                            color: '#9ca3af',
                            callback: function(value) {
                                return value + ' lbs';
                            }
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#9ca3af'
                        }
                    }
                }
            }
        });

        // Populate Customer Table
        const tableBody = document.getElementById('customerTable');
        customerData.forEach(customer => {
            const row = document.createElement('tr');
            const revenueShare = ((customer.revenue / totalRevenue) * 100).toFixed(1);
            
            row.innerHTML = `
                <td><strong>${customer.name}</strong></td>
                <td>${customer.service}</td>
                <td>$${customer.revenue.toFixed(2)}</td>
                <td>${customer.co2.toFixed(2)} lbs</td>
                <td>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${revenueShare}%"></div>
                    </div>
                    <small>${revenueShare}%</small>
                </td>
            `;
            tableBody.appendChild(row);
        });
    </script>
</body>
</html>
